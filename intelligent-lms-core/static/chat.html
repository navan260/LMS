<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-serif: 'Cormorant Garamond', serif;
            --bg-color: #050505;
            --glass-bg: rgba(18, 18, 20, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-color: #f3f4f6;
            --muted-text: #9ca3af;
            --accent-color: #d4af37;
            --accent-hover: #f1d570;
            --bot-msg-bg: rgba(18, 18, 20, 0.8);
            --user-msg-bg: linear-gradient(135deg, #d4af37, #aa8529);
            --danger-color: #ef4444;
            --success-color: #4ade80;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(-45deg, #050505, #111827, #0f172a, #000000);
            background-size: 400% 400%;
            animation: bgPan 25s ease infinite;
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        .sidebar {
            width: 320px;
            background: rgba(18, 18, 20, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem 2rem;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        h1 {
            margin-top: 0;
            font-family: var(--font-serif);
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--accent-color, var(--primary-color));
            text-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        h2 {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }

        .telemetry-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        select {
            width: 100%;
            box-sizing: border-box;
            padding: 0.85rem;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid var(--glass-border);
            margin-bottom: 0.5rem;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            appearance: none;
            cursor: pointer;
            transition: border-color 0.2s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        select:focus {
            border-color: var(--accent-color);
        }

        .chat-box {
            height: 65vh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            scroll-behavior: smooth;
        }

        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.2); border-radius: 10px; }

        .message {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: slideIn 0.3s ease-out forwards;
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-msg-bg);
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-msg-bg);
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .message.system {
            align-self: center;
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.35);
            color: #fbbf24;
            font-size: 0.9rem;
            border-radius: 12px;
            padding: 0.75rem 1.25rem;
        }

        .input-area {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 1.2rem 1.5rem;
            border-radius: 999px;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-family: inherit;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15), inset 0 2px 4px rgba(0,0,0,0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            border: none;
            border-radius: 999px;
            padding: 0 2rem;
            height: 54px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
        }
        
        .send-btn:active { transform: translateY(0); }

        .missing-nodes {
            font-size: 0.8rem;
            color: #fcd34d;
            margin-top: 0.75rem;
            padding-top: 0.5rem;
            border-top: 1px dashed rgba(252, 211, 77, 0.3);
        }

                .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
            margin-bottom: 2rem;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            align-self: flex-start;
        }

        .nav-link:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.3);
            color: #d4af37;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2), 0 0 15px rgba(212, 175, 55, 0.1);
        }
/* Markdown overrides */
        .message p:first-child { margin-top: 0; }
        .message p:last-child { margin-bottom: 0; }
        .message pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .message code {
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        /* Loader */
        .loader {
            display: none;
            align-self: flex-start;
            padding: 1rem 1.5rem;
        }
        .loader .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            margin: 0 2px;
            background: var(--text-color);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loader .dot:nth-child(1) { animation-delay: -0.32s; }
        .loader .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    
        @keyframes bgPan {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    
        .background-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.8));
            pointer-events: none;
            z-index: 0;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="background-overlay"></div>

    <div class="sidebar">
        <a href="/" class="nav-link">← Back to Menu</a>
        <div class="telemetry-card">
            <h2>Tutor Mode</h2>
            <select id="modeSelect">
                <option value="Auto">Auto (Adapts to State)</option>
                <option value="Socratic">Always Socratic</option>
                <option value="Normal">Always Direct Answer</option>
            </select>
            <p style="font-size: 0.85rem; color: var(--muted-text); margin-top: 0.5rem; margin-bottom: 0;">
                Backend logic adjusts the Agent based on this selection.
            </p>
        </div>
        <div class="telemetry-card">
            <h2>Cognitive State</h2>
            <div id="stateDisplay" style="width: 100%; box-sizing: border-box; padding: 1rem; border-radius: 12px; background: rgba(0, 0, 0, 0.4); color: var(--text-color); border: 1px solid var(--glass-border); text-align: center; font-weight: 700; font-size: 1.2rem; transition: all 0.4s ease; letter-spacing: 1px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);">
                UNKNOWN
            </div>
            <p style="font-size: 0.85rem; color: var(--muted-text); margin-top: 0.75rem; margin-bottom: 0;">
                Calculated automatically based on your behavior.
            </p>
        </div>
    </div>

    <div class="main-chat">
        <h1>Intelligent Tutor</h1>
        <div class="chat-box" id="chatBox">
            <div class="message bot">
                Hello! I'm your Socratic Tutor. Let's learn about programming! What do you know about variables?
            </div>
            <div class="loader" id="loader">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message here..."
                onkeypress="handleKeyPress(event)" autocomplete="off">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function getAuthToken() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token') || '';
        }

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const loader = document.getElementById('loader');

        let scrollDistance = 0;
        let lastChatTime = Date.now();
        let lastScrollPos = window.scrollY || chatBox.scrollTop;
        let dwellTimeSeconds = 0;
        let tabSwitches = 0;

        // Telemetry Trackers
        setInterval(() => {
            if (!document.hidden) dwellTimeSeconds++;
        }, 1000);

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) tabSwitches++;
        });

        chatBox.addEventListener('scroll', () => {
            const currentScroll = chatBox.scrollTop;
            scrollDistance += Math.abs(currentScroll - lastScrollPos);
            lastScrollPos = currentScroll;
        });

        function appendMessage(text, sender, missingNodes = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;

            if (sender === 'bot') {
                msgDiv.innerHTML = marked.parse(text);
            } else {
                msgDiv.textContent = text;
            }

            if (missingNodes && missingNodes.length > 0) {
                const missingDiv = document.createElement('div');
                missingDiv.className = 'missing-nodes';
                missingDiv.textContent = `[Memory Agent Alert] Missing Concepts: ${missingNodes.join(', ')}`;
                msgDiv.appendChild(missingDiv);
            }

            chatBox.insertBefore(msgDiv, loader);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const modeSelect = document.getElementById('modeSelect');
            const mode = modeSelect ? modeSelect.value : "Auto";

            appendMessage(text, 'user');
            userInput.value = '';
            
            loader.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            const now = Date.now();
            const timeDiffSecs = Math.max(1, (now - lastChatTime) / 1000);
            const scrollVelocity = scrollDistance / timeDiffSecs;

            lastChatTime = now;
            scrollDistance = 0;

            try {
                const token = getAuthToken();
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': token ? `Bearer ${token}` : ''
                    },
                    body: JSON.stringify({
                        message: text,
                        mode: mode,
                        telemetry: {
                            scroll_velocity: scrollVelocity,
                            dwell_time: dwellTimeSeconds,
                            tab_switches: tabSwitches
                        }
                    })
                });

                const data = await response.json();
                loader.style.display = 'none';
                
                appendMessage(data.reply || 'No response received.', data.status === 'not_enrolled' ? 'system' : 'bot', data.missing_nodes || []);
                
                const stateDisplay = document.getElementById('stateDisplay');
                if (stateDisplay && data.cognitive_state && data.status !== 'not_enrolled') {
                    const stateStr = data.cognitive_state.toUpperCase();
                    stateDisplay.textContent = stateStr;
                    
                    stateDisplay.style.color = '#ffffff';
                    stateDisplay.style.textShadow = '0 1px 2px rgba(0,0,0,0.2)';
                    
                    if (stateStr === 'FRUSTRATED') {
                        stateDisplay.style.background = 'linear-gradient(135deg, #ef4444, #b91c1c)';
                        stateDisplay.style.borderColor = '#991b1b';
                        stateDisplay.style.boxShadow = '0 0 20px rgba(239, 68, 68, 0.4)';
                    } else if (stateStr === 'FOCUSED') {
                        stateDisplay.style.background = 'linear-gradient(135deg, #10b981, #047857)';
                        stateDisplay.style.borderColor = '#065f46';
                        stateDisplay.style.boxShadow = '0 0 20px rgba(16, 185, 129, 0.4)';
                    } else {
                        stateDisplay.style.background = 'rgba(0, 0, 0, 0.4)';
                        stateDisplay.style.color = 'var(--text-color)';
                        stateDisplay.style.borderColor = 'var(--glass-border)';
                        stateDisplay.style.boxShadow = 'none';
                        stateDisplay.style.textShadow = 'none';
                    }
                }
            } catch (err) {
                console.error(err);
                loader.style.display = 'none';
                appendMessage('Error connecting to backend.', 'system');
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>

</html>
