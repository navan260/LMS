<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Interface</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --bot-msg-bg: #334155;
            --user-msg-bg: #2563eb;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background-color: var(--panel-bg);
            padding: 2rem;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        h1, h2 {
            margin-top: 0;
            font-weight: 600;
        }

        .telemetry-card {
            background-color: #0f172a;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
            width: 100%;
            margin-bottom: 0.5rem;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .chat-box {
            flex: 1;
            background-color: var(--panel-bg);
            border-radius: 16px;
            border: 1px solid #334155;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            display: flex;
            gap: 1rem;
        }

        input[type="text"] {
            flex: 1;
            background-color: var(--panel-bg);
            border: 1px solid #334155;
            color: var(--text-color);
            padding: 1rem 1.5rem;
            border-radius: 999px;
            outline: none;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .send-btn {
            width: auto;
            border-radius: 999px;
            padding: 1rem 2rem;
            margin: 0;
        }

        .missing-nodes {
            font-size: 0.875rem;
            color: #fbbf24;
            margin-top: 0.5rem;
        }
        
        .nav-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #94a3b8;
            text-decoration: none;
        }
        .nav-link:hover { color: white; }
        
        /* Markdown formatting overrides */
        .message p:first-child { margin-top: 0; }
        .message p:last-child { margin-bottom: 0; }
        .message pre { background-color: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 4px; overflow-x: auto; }
        .message code { font-family: monospace; background-color: rgba(0,0,0,0.2); padding: 0.1rem 0.3rem; border-radius: 3px; }
        
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <div class="sidebar">
        <a href="/" class="nav-link">← Back to Menu</a>
        <div class="telemetry-card">
            <h2>Tutor Mode</h2>
            <select id="modeSelect" style="width: 100%; padding: 0.75rem; border-radius: 8px; background: var(--panel-bg); color: white; border: 1px solid #334155; margin-bottom: 0.5rem; outline: none;">
                <option value="Auto">Auto (Adapts to State)</option>
                <option value="Socratic">Always Socratic</option>
                <option value="Normal">Always Direct Answer</option>
            </select>
            <p style="font-size: 0.875rem; color: #94a3b8; margin-top: 0.5rem;">
                Backend logic adjusts the Agent based on this selection.
            </p>
        </div>
    </div>

    <div class="main-chat">
        <h1>Intelligent Tutor</h1>
        <div class="chat-box" id="chatBox">
            <div class="message bot">
                Hello! I'm your Socratic Tutor. Let's learn about programming! What do you know about variables?
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message here (e.g. 'To summarize, variables...')" onkeypress="handleKeyPress(event)">
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        
        let scrollDistance = 0;
        let lastChatTime = Date.now();
        let lastScrollPos = window.scrollY || chatBox.scrollTop;
        let dwellTimeSeconds = 0;
        let tabSwitches = 0;

        // Telemetry Trackers
        setInterval(() => {
            if (!document.hidden) dwellTimeSeconds++;
        }, 1000);

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) tabSwitches++;
        });

        chatBox.addEventListener('scroll', () => {
            const currentScroll = chatBox.scrollTop;
            scrollDistance += Math.abs(currentScroll - lastScrollPos);
            lastScrollPos = currentScroll;
        });

        function appendMessage(text, sender, missingNodes = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            
            if (sender === 'bot') {
                msgDiv.innerHTML = marked.parse(text);
            } else {
                msgDiv.textContent = text;
            }
            
            if (missingNodes && missingNodes.length > 0) {
                const missingDiv = document.createElement('div');
                missingDiv.className = 'missing-nodes';
                missingDiv.textContent = `[Memory Agent Alert] Missing Concepts: ${missingNodes.join(', ')}`;
                msgDiv.appendChild(missingDiv);
            }

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            const modeSelect = document.getElementById('modeSelect');
            const mode = modeSelect ? modeSelect.value : "Auto";

            appendMessage(text, 'user');
            userInput.value = '';

            const now = Date.now();
            const timeDiffSecs = Math.max(1, (now - lastChatTime) / 1000);
            const scrollVelocity = scrollDistance / timeDiffSecs;
            
            lastChatTime = now;
            scrollDistance = 0;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: text, 
                        mode: mode,
                        telemetry: {
                            scroll_velocity: scrollVelocity,
                            dwell_time: dwellTimeSeconds,
                            tab_switches: tabSwitches
                        }
                    })
                });
                
                const data = await response.json();
                appendMessage(data.reply, 'bot', data.missing_nodes);
            } catch (err) {
                console.error(err);
                appendMessage('Error connecting to backend.', 'bot');
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }


    </script>
</body>
</html>
