<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent LMS Testing UI</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 2rem;
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
        }

        a {
            background-color: var(--panel-bg);
            color: var(--accent-color);
            padding: 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            border: 1px solid #334155;
            transition: all 0.2s;
        }

        a:hover {
            background-color: #334155;
            color: var(--accent-hover);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1>Intelligent LMS Modules</h1>
    <div class="link-container">
        <a href="/chat-ui">Chatbot Interface</a>
        <a href="/telemetry-ui">Telemetry Interface</a>
        <a href="/challenge-ui">Autonomous Challenge Mode</a>
        <a href="/upload-ui">Upload Document Interface</a>
    </div>
</body>
</html>
