<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent LMS Modules</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505; 
            --glass-bg: rgba(18, 18, 20, 0.65); 
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-color: #d4af37;
            --text-color: #f3f4f6;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Inter', sans-serif;
        }

        @keyframes bgPan {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: var(--font-sans);
            background: linear-gradient(-45deg, #050505, #111827, #0f172a, #000000);
            background-size: 400% 400%;
            animation: bgPan 25s ease infinite;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.8));
            pointer-events: none;
            z-index: 0;
        }

        h1 {
            margin-bottom: 3.5rem;
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--primary-color);
            text-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            animation: fadeInDown 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            text-align: center;
            z-index: 1;
            opacity: 0;
            transform: translateY(-30px);
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 480px;
            z-index: 1;
        }

        a {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-color);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .link-container a:nth-child(1) { animation-delay: 0.1s; }
        .link-container a:nth-child(2) { animation-delay: 0.2s; }
        .link-container a:nth-child(3) { animation-delay: 0.3s; }
        .link-container a:nth-child(4) { animation-delay: 0.4s; }
        .link-container a:nth-child(5) { animation-delay: 0.5s; }

        a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.05), transparent);
            transform: translateX(-100%);
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        a:hover::before {
            transform: translateX(100%);
        }

        a:hover {
            border-color: rgba(212, 175, 55, 0.3);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(212, 175, 55, 0.1);
            transform: translateY(-4px) scale(1.02);
            color: #ffffff;
        }

        a::after {
            content: '→';
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-weight: 500;
            opacity: 0.5;
            color: var(--primary-color);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        a:hover::after {
            opacity: 1;
            transform: translateX(6px);
        }

        @keyframes fadeInDown {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    <h1>Intelligent LMS Modules</h1>
    <div class="link-container">
        <a href="/token-ui">JWT Test Harness</a>
        <a href="/chat-ui">Chatbot Interface</a>
        <a href="/telemetry-ui">Telemetry Interface</a>
        <a href="/challenge-ui">Autonomous Challenge Mode</a>
        <a href="/upload-ui">Upload Document Interface</a>
        <a href="/stats-student-ui">Student Learning Stats</a>
        <a href="/stats-admin-ui">Admin Course Stats</a>
        <a href="/stats-coordinator-ui">Course Coordinator Stats</a>
    </div>
</body>
</html>
