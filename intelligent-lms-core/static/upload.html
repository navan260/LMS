<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        :root {
            --font-serif: 'Cormorant Garamond', serif;
            --bg-color: #050505;
            --glass-bg: rgba(18, 18, 20, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-color: #f3f4f6;
            --muted-text: #9ca3af;
            --accent-color: #d4af37;
            --accent-hover: #f1d570;
            --danger-color: #ef4444;
            --success-color: #4ade80;
        }

        body {
            margin: 0;
            padding: 2rem;
            padding-bottom: 4rem;
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(-45deg, #050505, #111827, #0f172a, #000000);
            background-size: 400% 400%;
            background-attachment: fixed;
            animation: bgPan 25s ease infinite;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 550px;
            position: relative;
            z-index: 10;
        }

        h1 {
            margin-top: 0;
            font-family: var(--font-serif);
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--accent-color, var(--primary-color));
            text-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            margin-bottom: 2rem;
            animation: fadeInDown 0.6s ease-out;
            text-align: center;
        }

        .telemetry-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.6s ease-out;
        }

        h2 { margin-top: 0; font-size: 1.5rem; margin-bottom: 0.5rem; }

        .file-upload-wrapper {
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .file-upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 3.5rem 2rem;
            background: rgba(0, 0, 0, 0.4);
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-sizing: border-box;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        .file-upload-label:hover, .file-upload-label.dragover {
            border-color: var(--accent-color);
            background: rgba(212, 175, 55, 0.05);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2), 0 0 20px rgba(212, 175, 55, 0.15);
        }

        .upload-icon {
            color: var(--accent-color);
            margin-bottom: 1.2rem;
            transition: transform 0.4s ease;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.4));
        }

        .file-upload-label:hover .upload-icon, .file-upload-label.dragover .upload-icon {
            transform: translateY(-6px);
        }

        .upload-text {
            font-size: 1.15rem;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 0.6rem;
            text-align: center;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .upload-subtext {
            font-size: 0.85rem;
            color: var(--muted-text);
            font-weight: 400;
        }

        button {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
            color: white;
            border: none;
            padding: 1.2rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            font-family: inherit;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
        }

        button:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: var(--muted-text);
            cursor: not-allowed;
            box-shadow: none;
        }

                .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
            margin-bottom: 2rem;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            align-self: flex-start;
        }

        .nav-link:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.3);
            color: #d4af37;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2), 0 0 15px rgba(212, 175, 55, 0.1);
        }
@keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }
        
        .processing-animation {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            color: var(--accent-color);
            font-weight: 600;
            text-align: center;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .success-animation {
            color: var(--success-color);
            font-weight: 600;
            text-align: center;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    
        @keyframes bgPan {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    
        .background-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.8));
            pointer-events: none;
            z-index: 0;
        }

        /* Full Screen Loader Overlay */
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .loader-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        #particles-js {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        .loader-content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .orbital-spinner {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 2.5rem;
            transform-style: preserve-3d;
            perspective: 800px;
        }

        .orbital-spinner .core {
            position: absolute;
            top: 50%; left: 50%;
            width: 24px; height: 24px;
            margin-top: -12px; margin-left: -12px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent-color), 0 0 40px var(--accent-color);
            animation: pulseCore 1.5s ease-in-out infinite alternate;
        }

        @keyframes pulseCore {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .loader-text {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--accent-color);
            margin: 0 0 1rem 0;
            animation: pulseText 2s ease-in-out infinite alternate;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            letter-spacing: 1px;
        }

        .loader-subtext {
            color: #d1d5db;
            font-size: 1.1rem;
            margin: 0;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        @keyframes pulseText {
            0% { opacity: 0.8; }
            100% { opacity: 1; text-shadow: 0 0 25px rgba(212, 175, 55, 0.7); }
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <!-- Full Screen Loader Overlay -->
    <div class="loader-overlay" id="loaderOverlay">
        <div id="particles-js"></div>
        <div class="loader-content">
            <div class="orbital-spinner">
                <div class="core"></div>
            </div>
            <h2 class="loader-text">Extracting Knowledge Graph</h2>
            <p class="loader-subtext">Parsing document logic and mapping complex relationships...</p>
        </div>
    </div>

    <div class="container">
        <a href="/" class="nav-link">← Back to Menu</a>
        <h1>Document Upload</h1>
        
        <div class="telemetry-card">
            <h2>Ingest Knowledge</h2>
            <p style="font-size: 0.95rem; color: var(--muted-text); margin-bottom: 2rem; line-height: 1.5;">
                Upload PDFs or TXT files for the Vector RAG and Graph extraction system. Materials will be scoped to your current enrolled course context.
            </p>
            <div class="file-upload-wrapper">
                <input type="file" id="fileInput" accept=".pdf,.txt" style="display: none;">
                <label for="fileInput" class="file-upload-label" id="fileDropzone">
                    <svg class="upload-icon" width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <span class="upload-text" id="uploadText">Click to browse or drag file here</span>
                    <span class="upload-subtext">Supported formats: PDF, TXT</span>
                </label>
            </div>
            <button onclick="uploadDocument()" id="uploadBtn">Process Document</button>
            <div id="uploadStatus" style="display: none;"></div>
        </div>
    </div>

    <script>
        function getAuthToken() {
            const params = new URLSearchParams(window.location.search);
            return params.get('token') || '';
        }

        const fileInput = document.getElementById('fileInput');
        const uploadText = document.getElementById('uploadText');
        const dropzone = document.getElementById('fileDropzone');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                uploadText.textContent = `Selected: ${e.target.files[0].name}`;
                uploadText.style.color = 'var(--accent-color)';
            } else {
                uploadText.textContent = 'Click to browse or drag file here';
                uploadText.style.color = 'var(--text-color)';
            }
        });

        // Drag and drop events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => dropzone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => dropzone.classList.remove('dragover'), false);
        });

        dropzone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length) {
                fileInput.files = files;
                fileInput.dispatchEvent(new Event('change'));
            }
        });

        let particlesInitialized = false;

        function initGraphParticles() {
            if (particlesInitialized) return;
            particlesInitialized = true;
            particlesJS("particles-js", {
              "particles": {
                "number": { "value": 70, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#d4af37" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.6, "random": false, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 3, "random": true },
                "line_linked": {
                  "enable": true,
                  "distance": 150,
                  "color": "#d4af37",
                  "opacity": 0.3,
                  "width": 1.5
                },
                "move": {
                  "enable": true,
                  "speed": 1.5,
                  "direction": "none",
                  "random": false,
                  "straight": false,
                  "out_mode": "out",
                  "bounce": false,
                  "attract": { "enable": false, "rotateX": 600, "rotateY": 1200 }
                }
              },
              "interactivity": {
                "detect_on": "canvas",
                "events": {
                  "onhover": { "enable": false },
                  "onclick": { "enable": false },
                  "resize": true
                }
              },
              "retina_detect": true
            });
        }

        async function uploadDocument() {
            const fileInput = document.getElementById('fileInput');
            const uploadBtn = document.getElementById('uploadBtn');
            const uploadStatus = document.getElementById('uploadStatus');

            if (!fileInput.files || fileInput.files.length === 0) {
                alert('Please select a file to upload.');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Extracting Graph...';
            
            // Show full screen overlay
            const loaderOverlay = document.getElementById('loaderOverlay');
            loaderOverlay.classList.add('active');
            initGraphParticles();

            // Hide the old inline status when starting
            uploadStatus.style.display = 'none';

            try {
                const token = getAuthToken();
                const response = await fetch('/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': token ? `Bearer ${token}` : ''
                    },
                    body: formData
                });
                const data = await response.json();
                
                if (data.status === 'not_enrolled') {
                    alert(data.message || 'You are not enrolled in this course yet.');
                    uploadStatus.style.display = 'none';
                } else if (data.error) {
                    alert(data.error);
                    uploadStatus.style.display = 'none';
                } else {
                    uploadStatus.className = 'success-animation';
                    uploadStatus.innerHTML = `✓ ${data.message || 'Finished uploading document!'}`;
                    fileInput.value = '';
                    uploadText.textContent = 'Click to browse or drag file here';
                    uploadText.style.color = 'var(--text-color)';
                }
            } catch (err) {
                console.error(err);
                alert('Failed to upload document.');
                uploadStatus.style.display = 'none';
            } finally {
                // Hide full screen overlay
                document.getElementById('loaderOverlay').classList.remove('active');
                
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Process Another Document';
            }
        }
    </script>
</body>
</html>
