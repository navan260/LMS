<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Course Statistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root {
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Inter', -apple-system, sans-serif;
            --bg-color: #050505;
            --glass-bg: rgba(18, 18, 20, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-color: #f3f4f6;
            --muted-text: #9ca3af;
            --accent-color: #d4af37;
            --accent-hover: #f1d570;
            --danger-color: #ef4444;
            --success-color: #4ade80;
            --warning-color: #f59e0b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: var(--font-sans);
            color: var(--text-color);
            min-height: 100vh;
            background: linear-gradient(-45deg, #050505, #111827, #0f172a, #000000);
            background-size: 400% 400%;
            animation: bgPan 25s ease infinite;
            padding: 2.5rem 1.5rem 4rem;
            position: relative;
        }

        @keyframes bgPan {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .background-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.8));
            pointer-events: none;
            z-index: 0;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .title-block {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: clamp(2rem, 3vw, 3.2rem);
            font-weight: 600;
            margin: 0;
            letter-spacing: 1px;
            color: var(--accent-color);
            text-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }

        h2 {
            font-family: var(--font-serif);
            font-weight: 500;
            color: var(--text-color);
            margin-top: 0;
            letter-spacing: 0.4px;
        }

        .subtitle {
            color: var(--muted-text);
            margin: 0.35rem 0 0;
            max-width: 520px;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .nav-link:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.3);
            color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2), 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.6rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .metric {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .metric span {
            font-size: 0.85rem;
            color: var(--muted-text);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .metric strong {
            display: block;
            font-size: 2.4rem;
            font-family: var(--font-serif);
            color: var(--accent-color);
            margin-top: 0.4rem;
        }

        .highlight {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .highlight strong {
            font-family: var(--font-serif);
            font-size: 1.4rem;
            color: var(--accent-color);
        }

        .badge {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.35);
            padding: 0.4rem 0.8rem;
            border-radius: 999px;
            color: var(--accent-hover);
            font-size: 0.85rem;
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .list-item {
            padding: 0.8rem 1rem;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .list-item span:last-child {
            color: var(--accent-hover);
            font-weight: 500;
        }

        .chart {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
        }

        .bar > span {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), var(--accent-hover));
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.35rem;
            color: var(--text-color);
            font-size: 0.85rem;
        }

        .bar-label span:last-child {
            color: var(--accent-hover);
            font-weight: 500;
        }

        .panel-row {
            display: grid;
            grid-template-columns: minmax(260px, 1.2fr) minmax(260px, 1fr);
            gap: 1.5rem;
        }

        @media (max-width: 960px) {
            .panel-row { grid-template-columns: 1fr; }
        }

        .empty {
            color: var(--muted-text);
            text-align: center;
            padding: 2rem;
        }

        @media (max-width: 720px) {
            header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    <div class="content-wrapper">
        <header>
            <div class="title-block">
                <h1>Admin Course Pulse</h1>
                <p class="subtitle">Understand enrollment concentration and mastery momentum across courses.</p>
            </div>
            <a class="nav-link" href="/">← Back to Menu</a>
        </header>

        <section class="grid">
            <div class="panel metric">
                <span>Total Courses</span>
                <strong id="totalCourses">0</strong>
            </div>
            <div class="panel metric">
                <span>Total Students</span>
                <strong id="totalStudents">0</strong>
            </div>
            <div class="panel metric">
                <span>Total Enrollments</span>
                <strong id="totalEnrollments">0</strong>
            </div>
        </section>

        <section class="panel-row" style="margin-bottom: 1.5rem;">
            <div class="panel">
                <div class="highlight">
                    <div>
                        <h2>Top Course</h2>
                        <strong id="topCourseName"></strong>
                        <p class="subtitle" style="margin-top:0.4rem;">Highest enrollment right now</p>
                    </div>
                    <span id="topCourseBadge" class="badge"></span>
                </div>
            </div>
            <div class="panel">
                <h2>Top Courses by Enrollment</h2>
                <div id="topCoursesChart" class="chart" style="min-height: 280px; margin-top: 1rem;"></div>
            </div>
        </section>

        <section class="panel">
            <h2>Courses with Highest Mastery Rate</h2>
            <div id="masteryRatesChart" class="chart" style="min-height: 320px; margin-top: 1rem;"></div>
        </section>
    </div>

    <script>
        const totalCourses = document.getElementById('totalCourses');
        const totalStudents = document.getElementById('totalStudents');
        const totalEnrollments = document.getElementById('totalEnrollments');
        const topCourseName = document.getElementById('topCourseName');
        const topCourseBadge = document.getElementById('topCourseBadge');
        const topCoursesChartEl = document.getElementById('topCoursesChart');
        const masteryRatesChartEl = document.getElementById('masteryRatesChart');

        let topCoursesChart;
        let masteryChart;

        function getAuthToken() {
            const params = new URLSearchParams(window.location.search);
            const urlToken = params.get('token');
            if (urlToken) return urlToken;
            return localStorage.getItem('lms_test_jwt') || '';
        }

        async function fetchStats() {
            const token = getAuthToken();
            const res = await fetch('/stats/admin', {
                headers: { 'Authorization': token ? `Bearer ${token}` : '' }
            });
            return res.json();
        }

        function renderTopCourses(items) {
            if (topCoursesChart) topCoursesChart.dispose();
            if (!items || items.length === 0) {
                topCoursesChartEl.innerHTML = '<div class="empty">No course enrollments yet.</div>';
                return;
            }
            topCoursesChartEl.innerHTML = '';
            topCoursesChart = echarts.init(topCoursesChartEl);
            
            const sorted = [...items].reverse();
            const labels = sorted.map(i => i.shortname || i.fullname || i.courseid || 'Unknown');
            const values = sorted.map(i => i.enrolled_count);

            topCoursesChart.setOption({
                grid: { left: '3%', right: '10%', bottom: '5%', top: '5%', containLabel: true },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                xAxis: {
                    type: 'value',
                    axisLine: { show: false },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.08)' } },
                    axisLabel: { color: '#9ca3af' }
                },
                yAxis: {
                    type: 'category',
                    data: labels,
                    axisLine: { show: false },
                    axisTick: { show: false },
                    axisLabel: { color: '#f3f4f6', fontFamily: 'Inter', width: 140, overflow: 'truncate' }
                },
                series: [{
                    type: 'bar',
                    data: values,
                    barWidth: '45%',
                    itemStyle: { 
                        borderRadius: [0, 4, 4, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#aa8529' },
                            { offset: 1, color: '#d4af37' }
                        ])
                    },
                    label: { show: true, position: 'right', color: '#d4af37', fontWeight: 600 }
                }]
            });
        }

        function renderMastery(items) {
            if (masteryChart) masteryChart.dispose();
            if (!items || items.length === 0) {
                masteryRatesChartEl.innerHTML = '<div class="empty">No mastery data yet.</div>';
                return;
            }
            masteryRatesChartEl.innerHTML = '';
            masteryChart = echarts.init(masteryRatesChartEl);
            
            const sorted = [...items].reverse();
            const labels = sorted.map(i => i.shortname || i.fullname || i.courseid || 'Unknown');
            const values = sorted.map(i => ((i.mastery_rate || 0) * 100).toFixed(1));

            masteryChart.setOption({
                grid: { left: '3%', right: '8%', bottom: '5%', top: '5%', containLabel: true },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' }, valueFormatter: v => v + '%' },
                xAxis: {
                    type: 'value',
                    max: 100,
                    axisLine: { show: false },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.08)' } },
                    axisLabel: { color: '#9ca3af', formatter: '{value}%' }
                },
                yAxis: {
                    type: 'category',
                    data: labels,
                    axisLine: { show: false },
                    axisTick: { show: false },
                    axisLabel: { color: '#f3f4f6', fontFamily: 'Inter', width: 140, overflow: 'truncate' }
                },
                series: [{
                    type: 'bar',
                    data: values,
                    barWidth: '40%',
                    itemStyle: { 
                        borderRadius: [0, 4, 4, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                            { offset: 0, color: '#22c55e' },
                            { offset: 1, color: '#4ade80' }
                        ])
                    },
                    label: { show: true, position: 'right', color: '#4ade80', fontWeight: 600, formatter: '{c}%' }
                }]
            });
        }

        async function init() {
            const data = await fetchStats();
            totalCourses.textContent = data.total_courses ?? 0;
            totalStudents.textContent = data.total_students ?? 0;
            totalEnrollments.textContent = data.total_enrollments ?? 0;

            const topCourse = data.top_course;
            if (topCourse) {
                const name = topCourse.fullname || topCourse.shortname || topCourse.courseid || 'Unknown';
                topCourseName.textContent = name;
                topCourseBadge.textContent = `${topCourse.enrolled_count} learners`;
            } else {
                topCourseName.textContent = 'No data yet';
                topCourseBadge.textContent = '';
            }

            renderTopCourses(data.top_courses || []);
            renderMastery(data.mastery_rates || []);
        }

        init();
    </script>
</body>
</html>
